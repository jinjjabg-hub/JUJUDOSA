<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주주도사 · 사주 상담</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --bg:#F7F8FA; --card:#FFF; --text:#191F28; --sub:#8B95A1; --line:#E5E8EB;
  --primary:#5D5FEF; --primary-tint:#EFF0FE;
  --wood:#12B76A; --fire:#F04438; --earth:#F79009; --metal:#667085; --water:#2E90FA;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--text);
  font-family:'Pretendard Variable',Pretendard,-apple-system,'Noto Sans KR',sans-serif;
  -webkit-font-smoothing:antialiased}
.wrap{max-width:480px;margin:0 auto;padding:20px 16px 32px;display:flex;flex-direction:column;min-height:100%}
header{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--primary)}
.brand{font-size:18px;font-weight:800;letter-spacing:-.02em}
.badge{margin-left:auto;font-size:11px;color:var(--sub);background:#fff;border:1px solid var(--line);
  border-radius:999px;padding:4px 10px}

.panel{background:var(--card);border-radius:20px;padding:20px;margin-bottom:14px;
  box-shadow:0 1px 3px rgba(25,31,40,.06)}
.tabs{display:flex;background:#F2F4F6;border-radius:12px;padding:4px;margin-bottom:18px}
.tab{flex:1;text-align:center;padding:9px;border-radius:9px;font-size:14px;font-weight:600;
  color:var(--sub);cursor:pointer;transition:.15s}
.tab.on{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(25,31,40,.1)}
h2{font-size:15px;font-weight:700;margin-bottom:14px;letter-spacing:-.02em}
.row{display:flex;gap:10px;margin-bottom:12px}.row>*{flex:1}
label.f{display:block;font-size:12px;color:var(--sub);margin-bottom:6px;font-weight:500}
input,select{width:100%;background:#fff;border:1.5px solid var(--line);color:var(--text);
  border-radius:12px;padding:13px 14px;font-size:15px;font-family:inherit;transition:.15s}
input:focus,select:focus{outline:none;border-color:var(--primary)}
input::placeholder{color:#B0B8C1}
.gender{display:flex;gap:8px}
.gbtn{flex:1;padding:12px;border-radius:12px;border:1.5px solid var(--line);background:#fff;
  color:var(--sub);font-size:14px;font-weight:600;cursor:pointer;text-align:center;transition:.15s}
.gbtn.on{border-color:var(--primary);color:var(--primary);background:var(--primary-tint)}
.opt{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--sub);margin-top:2px}
.opt input{width:16px;height:16px;accent-color:var(--primary)}
.advbtn{background:none;border:none;color:var(--sub);font-size:13px;font-weight:500;
  cursor:pointer;padding:8px 0;font-family:inherit}
.adv{display:none;padding-top:4px}
button.go{width:100%;margin-top:14px;background:var(--primary);color:#fff;border:none;border-radius:14px;
  padding:16px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:-.02em;transition:.15s}
button.go:active{transform:scale(.98);opacity:.9}
.pb{display:none;border-top:1px solid var(--line);margin-top:16px;padding-top:16px}

#summary{display:none;background:var(--card);border-radius:20px;padding:16px 18px;margin-bottom:12px;
  box-shadow:0 1px 3px rgba(25,31,40,.06);text-align:center}
#summary .gz{font-size:22px;font-weight:800;letter-spacing:.06em}
#summary .meta{font-size:12px;color:var(--sub);margin-top:5px}

#chatArea{display:none;flex-direction:column;flex:1}
#log{flex:1;display:flex;flex-direction:column;gap:10px;margin-bottom:14px;min-height:300px}
.msg{max-width:86%;padding:12px 15px;border-radius:18px;font-size:15px;line-height:1.7;
  white-space:pre-wrap;letter-spacing:-.01em}
.msg.dosa{background:#fff;color:var(--text);border-bottom-left-radius:6px;align-self:flex-start;
  box-shadow:0 1px 3px rgba(25,31,40,.06)}
.msg.dosa::before{content:'주주도사';display:block;font-size:11px;color:var(--primary);
  font-weight:700;margin-bottom:5px}
.msg.me{background:var(--primary);color:#fff;border-bottom-right-radius:6px;align-self:flex-end}
.msg.thinking{background:#fff;align-self:flex-start;color:var(--sub);font-style:normal;
  box-shadow:0 1px 3px rgba(25,31,40,.06)}
.inputbar{display:flex;gap:8px;background:#fff;border:1.5px solid var(--line);border-radius:16px;
  padding:6px 6px 6px 16px;align-items:center}
.inputbar input{flex:1;border:none;padding:10px 0;font-size:15px}
.inputbar input:focus{border:none}
.inputbar button{background:var(--primary);color:#fff;border:none;border-radius:11px;
  padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
.err{color:#F04438;font-size:13px;margin-top:10px;display:none;font-weight:500}
footer{text-align:center;font-size:11px;color:#B0B8C1;margin-top:20px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="dot"></div>
    <div class="brand">주주도사</div>
    <div class="badge">프로토타입</div>
  </header>

  <div class="panel" id="setup">
    <div class="tabs">
      <div class="tab on" id="tabS" onclick="setMode('S')">사주 상담</div>
      <div class="tab" id="tabG" onclick="setMode('G')">궁합</div>
    </div>
    <h2 id="setupTitle">생년월일시를 알려주세요</h2>
    <div class="row">
      <div><label class="f">생년월일</label><input type="text" id="bdate" inputmode="numeric" maxlength="10" placeholder="19711116" autocomplete="off"></div>
      <div><label class="f">태어난 시각</label><input type="time" id="btime" value="12:00"></div>
    </div>
    <div class="row">
      <div>
        <label class="f">성별</label>
        <div class="gender">
          <div class="gbtn" id="gM" onclick="setG('M')">남</div>
          <div class="gbtn" id="gF" onclick="setG('F')">여</div>
        </div>
      </div>
    </div>
    <button class="advbtn" onclick="advToggle('advA',this)">출생지 등 상세 설정 ⌄</button>
    <div class="adv" id="advA">
      <div class="row">
        <div>
          <label class="f">출생 지역 (시각 보정)</label>
          <select id="region">
            <option value="126.98">서울·수도권</option>
            <option value="129.08">부산</option>
            <option value="128.60">대구</option>
            <option value="126.85">광주</option>
            <option value="127.38">대전</option>
            <option value="128.90">강릉</option>
            <option value="126.53">제주</option>
          </select>
        </div>
      </div>
      <label class="opt"><input type="checkbox" id="timeUnknown"> 태어난 시간을 몰라요</label>
    </div>

    <div class="pb" id="pB">
      <h2>상대방 정보</h2>
      <div class="row">
        <div><label class="f">상대 생년월일</label><input type="text" id="bdate2" inputmode="numeric" maxlength="10" placeholder="19750305" autocomplete="off"></div>
        <div><label class="f">태어난 시각</label><input type="time" id="btime2" value="12:00"></div>
      </div>
      <div class="row">
        <div>
          <label class="f">상대 성별</label>
          <div class="gender">
            <div class="gbtn" id="g2M" onclick="setG2('M')">남</div>
            <div class="gbtn" id="g2F" onclick="setG2('F')">여</div>
          </div>
        </div>
        <div>
          <label class="f">두 분의 관계</label>
          <select id="relType">
            <option value="연인">연인</option>
            <option value="부부">부부·배우자</option>
            <option value="결혼을 생각하는 상대">결혼을 생각하는 상대</option>
            <option value="사업 파트너">사업 파트너</option>
            <option value="직장 동료·상사">직장 동료·상사</option>
            <option value="친구·지인">친구·지인</option>
          </select>
        </div>
      </div>
      <button class="advbtn" onclick="advToggle('advB',this)">상대 출생지 등 상세 설정 ⌄</button>
      <div class="adv" id="advB">
        <div class="row">
          <div>
            <label class="f">상대 출생 지역</label>
            <select id="region2">
              <option value="126.98">서울·수도권</option>
              <option value="129.08">부산</option>
              <option value="128.60">대구</option>
              <option value="126.85">광주</option>
              <option value="127.38">대전</option>
              <option value="128.90">강릉</option>
              <option value="126.53">제주</option>
            </select>
          </div>
        </div>
        <label class="opt"><input type="checkbox" id="timeUnknown2"> 상대 태어난 시간을 몰라요</label>
      </div>
    </div>

    <button class="go" id="goBtn" onclick="start()">내 사주 보기</button>
    <div class="err" id="err"></div>
  </div>

  <div id="summary"></div>

  <div id="chatArea">
    <div id="log"></div>
    <div class="inputbar">
      <input type="text" id="q" placeholder="도사님께 물어보세요" onkeydown="if(event.key==='Enter')send()">
      <button onclick="send()">전송</button>
    </div>
    <div class="err" id="cerr"></div>
  </div>

  <footer>주주도사 · 상담 내용은 참고용입니다</footer>
</div>

<script>
/* ===== 만세력 코어 (검증 완료 엔진 v0.1 + 대운) ===== */
const SH=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'],SK=['갑','을','병','정','무','기','경','신','임','계'];
const BH=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'],BK=['자','축','인','묘','진','사','오','미','신','유','술','해'];
const SE=[0,0,1,1,2,2,3,3,4,4],BE=[4,2,0,0,2,1,1,2,3,3,2,4],EK=['목','화','토','금','수'];
const DST=[['1948-06-01T00:00','1948-09-13T00:00'],['1949-04-03T00:00','1949-09-11T00:00'],
['1950-04-01T00:00','1950-09-10T00:00'],['1951-05-06T00:00','1951-09-09T00:00'],
['1955-05-05T00:00','1955-09-09T00:00'],['1956-05-20T00:00','1956-09-30T00:00'],
['1957-05-05T00:00','1957-09-22T00:00'],['1958-05-04T00:00','1958-09-21T00:00'],
['1959-05-03T00:00','1959-09-20T00:00'],['1960-05-01T00:00','1960-09-18T00:00'],
['1987-05-10T02:00','1987-10-11T03:00'],['1988-05-08T02:00','1988-10-09T03:00']];
const K830S='1954-03-21T00:00',K830E='1961-08-10T00:00';
const pad=(n,w=2)=>String(n).padStart(w,'0');
const tk=(y,mo,d,h,mi)=>`${pad(y,4)}-${pad(mo)}-${pad(d)}T${pad(h)}:${pad(mi)}`;
function jdn(y,mo,d){const a=Math.floor((14-mo)/12),yy=y+4800-a,mm=mo+12*a-3;
 return d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045;}
function fromJdn(j){let a=j+32044;const b=Math.floor((4*a+3)/146097),c=a-Math.floor(146097*b/4),
 dd=Math.floor((4*c+3)/1461),e=c-Math.floor(1461*dd/4),m=Math.floor((5*e+2)/153);
 return{d:e-Math.floor((153*m+2)/5)+1,mo:m+3-12*Math.floor(m/10),y:100*b+dd-4800+Math.floor(m/10)};}
function addMin(y,mo,d,h,mi,del){let t=h*60+mi+del,ds=Math.floor(t/1440);t-=ds*1440;
 const dt=fromJdn(jdn(y,mo,d)+ds);return{y:dt.y,mo:dt.mo,d:dt.d,h:Math.floor(t/60),mi:t%60};}
function sunLon(jde){const T=(jde-2451545)/36525,r=Math.PI/180;
 const L0=280.46646+36000.76983*T+.0003032*T*T,M=357.52911+35999.05029*T-.0001537*T*T;
 const C=(1.914602-.004817*T-.000014*T*T)*Math.sin(M*r)+(.019993-.000101*T)*Math.sin(2*M*r)+.000289*Math.sin(3*M*r);
 let L=L0+C-.00569-.00478*Math.sin((125.04-1934.136*T)*r);L%=360;return L<0?L+360:L;}
const jdeUT=(y,mo,d,h,mi)=>jdn(y,mo,d)-0.5+(h+mi/60)/24;
function ipchun(year){let lo=jdeUT(year,1,25,0,0),hi=jdeUT(year,2,15,0,0);
 const f=j=>{let d=sunLon(j)-315;while(d>180)d-=360;while(d<-180)d+=360;return d;};
 for(let i=0;i<60;i++){const m=(lo+hi)/2;if(f(m)<0)lo=m;else hi=m;}return(lo+hi)/2;}
function computeSaju(inp){
 const{y,mo,d,h=12,mi=0,timeUnknown=false,lonDeg=127,useLon=true,yajasi=false}=inp;
 const key=tk(y,mo,d,h,mi);let dstMin=0;
 for(const[s,e]of DST)if(key>=s&&key<e){dstMin=-60;break;}
 const is830=key>=K830S&&key<K830E,mer=is830?127.5:135,lonMin=useLon?Math.round((lonDeg-mer)*4):0;
 const std=addMin(y,mo,d,h,mi,dstMin),ut=addMin(std.y,std.mo,std.d,std.h,std.mi,-(is830?510:540));
 const jde=jdeUT(ut.y,ut.mo,ut.d,ut.h,ut.mi),lon=sunLon(jde);
 let sy=std.y;if(jde<ipchun(std.y))sy=std.y-1;
 const ys=((sy-4)%10+10)%10,yb=((sy-4)%12+12)%12;
 const mIdx=Math.floor((((lon-315)%360)+360)%360/30),mb=(mIdx+2)%12,ms=((ys%5)*2+2+mIdx)%10;
 const app=addMin(std.y,std.mo,std.d,std.h,std.mi,lonMin);
 let dj=jdn(app.y,app.mo,app.d);if(!timeUnknown&&app.h===23&&!yajasi)dj+=1;
 const dgz=((dj+49)%60+60)%60,ds=dgz%10,db=dgz%12;
 let hs=null,hb=null;
 if(!timeUnknown){hb=Math.floor(((app.h*60+app.mi+60)%1440)/120);hs=((ds%5)*2+hb)%10;}
 const P=[{label:'년주',stem:ys,branch:yb},{label:'월주',stem:ms,branch:mb},{label:'일주',stem:ds,branch:db}];
 if(hs!==null)P.push({label:'시주',stem:hs,branch:hb});
 const ec=[0,0,0,0,0];for(const p of P){ec[SE[p.stem]]++;ec[BE[p.branch]]++;}
 return{pillars:P,elemCount:ec,sajuYear:sy,jde,corrections:{lonMin,dst:dstMin!==0,is830,appliedTime:app},timeUnknown};}
function adjTerm(jde,fw){const lon=sunLon(jde),mod=((lon-15)%30+30)%30;
 const tg=fw?(((lon-mod+30)%360)+360)%360:(((lon-mod)%360)+360)%360;
 const f=t=>{let d=sunLon(t)-tg;while(d>180)d-=360;while(d<-180)d+=360;return d;};
 let lo,hi;if(fw){lo=jde;hi=jde+(30-mod)/0.95+2;}else{hi=jde;lo=jde-mod/0.95-2;}
 for(let i=0;i<60;i++){const m=(lo+hi)/2;if(f(m)<0)lo=m;else hi=m;}return(lo+hi)/2;}
// 십성: 일간 대비 관계. 지지는 지장간 본기 기준
const BMAIN=[9,5,0,1,4,2,3,5,6,7,4,8]; // 子癸 丑己 寅甲 卯乙 辰戊 巳丙 午丁 未己 申庚 酉辛 戌戊 亥壬
function sipseong(dayS,otherS){
 const de=SE[dayS],oe=SE[otherS],same=(dayS%2)===(otherS%2);
 if(oe===de)return same?'비견':'겁재';
 if((de+1)%5===oe)return same?'식신':'상관';
 if((de+2)%5===oe)return same?'편재':'정재';
 if((oe+2)%5===de)return same?'편관':'정관';
 return same?'편인':'정인';}
function computeDaeun(jde,ys,ms,mb,gender,count=8){
 const fw=(ys%2===0)===(gender==='M');
 const days=Math.abs(adjTerm(jde,fw)-jde);
 let sa=Math.round(days/3);if(sa<1)sa=1;if(sa>10)sa=10;
 let mg=-1;for(let k=0;k<60;k++)if(k%10===ms&&k%12===mb){mg=k;break;}
 const ps=[];for(let i=1;i<=count;i++){const g=((mg+(fw?i:-i))%60+60)%60;
  ps.push({ageStart:sa+(i-1)*10,ageEnd:sa+i*10-1,stem:g%10,branch:g%12});}
 return{forward:fw,startAge:sa,pillars:ps};}

/* ===== 궁합 합충 계산 ===== */
const SAMHAP=[[8,0,4],[2,6,10],[5,9,1],[11,3,7]]; // 신자진 인오술 사유축 해묘미
function stemRel(a,b){
 if(a===b)return '같은 글자';
 if(Math.abs(a-b)===5)return '천간합';
 const de=SE[a],oe=SE[b];
 if(de===oe)return '같은 오행';
 if((de+1)%5===oe)return '나가 상대를 생함';
 if((oe+1)%5===de)return '상대가 나를 생함';
 if((de+2)%5===oe)return '나가 상대를 극함';
 return '상대가 나를 극함';}
function branchRel(a,b){
 if(a===b)return '같은 글자';
 if(a+b===13||(a===0&&b===1)||(a===1&&b===0))return '육합';
 if(Math.abs(a-b)===6)return '충';
 for(const g of SAMHAP)if(g.includes(a)&&g.includes(b))return '삼합(반합)';
 return '합충 없음';}

/* ===== 앱 로직 ===== */
let gender=null,gender2=null,mode='S',history=[],persona='';
function setMode(m){mode=m;
 document.getElementById('tabS').classList.toggle('on',m==='S');
 document.getElementById('tabG').classList.toggle('on',m==='G');
 document.getElementById('pB').style.display=m==='G'?'block':'none';
 document.getElementById('setupTitle').textContent=m==='G'?'두 분의 정보를 알려주세요':'생년월일시를 알려주세요';
 document.getElementById('goBtn').textContent=m==='G'?'궁합 보기':'내 사주 보기';}
function setG2(g){gender2=g;document.getElementById('g2M').classList.toggle('on',g==='M');
 document.getElementById('g2F').classList.toggle('on',g==='F');}
const bdateEl=document.getElementById('bdate');
function autoFmt(el){el.addEventListener('input',()=>{const dg=el.value.replace(/\D/g,'').slice(0,8);
 let o=dg;if(dg.length>6)o=dg.slice(0,4)+'-'+dg.slice(4,6)+'-'+dg.slice(6);
 else if(dg.length>4)o=dg.slice(0,4)+'-'+dg.slice(4);el.value=o;});}
autoFmt(bdateEl);autoFmt(document.getElementById('bdate2'));

function parsePerson(dateId,timeId,tuId,regionId,g,who){
 const dg=document.getElementById(dateId).value.replace(/\D/g,'');
 if(dg.length!==8)return{err:who+' 생년월일을 8자리로 입력해 주세요.'};
 const y=+dg.slice(0,4),mo=+dg.slice(4,6),d=+dg.slice(6,8);
 if(y<1900||y>2030)return{err:who+' 연도는 1900~2030년 사이여야 합니다.'};
 const c=new Date(y,mo-1,d);
 if(c.getFullYear()!==y||c.getMonth()!==mo-1||c.getDate()!==d)return{err:who+' 날짜가 존재하지 않습니다.'};
 if(!g)return{err:who+' 성별을 선택해 주세요.'};
 const tu=document.getElementById(tuId).checked;
 const[h,mi]=(document.getElementById(timeId).value||'12:00').split(':').map(Number);
 const lon=parseFloat(document.getElementById(regionId).value);
 const r=computeSaju({y,mo,d,h,mi,timeUnknown:tu,lonDeg:lon,useLon:true});
 const mp=r.pillars[1],yp=r.pillars[0];
 const daeun=tu?null:computeDaeun(r.jde,yp.stem,mp.stem,mp.branch,g);
 const nowY=new Date().getFullYear(),age=nowY-y+1;
 let cur=null;if(daeun)for(const p of daeun.pillars)if(age>=p.ageStart&&age<=p.ageEnd)cur=p;
 return{r,daeun,cur,age,gender:g,nowY};}

function personBlock(P,title){
 const r=P.r,ds=r.pillars[2].stem;
 return `${title}

function addMsg(txt,cls){const log=document.getElementById('log');
 const m=document.createElement('div');m.className='msg '+cls;m.textContent=txt;
 log.appendChild(m);m.scrollIntoView({behavior:'smooth',block:'end'});return m;}

async function callDosa(maxTok){
 const th=addMsg('명식을 살피는 중…','thinking');
 try{
  const res=await fetch('https://api.anthropic.com/v1/messages',{
   method:'POST',headers:{'Content-Type':'application/json'},
   body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTok||1500,system:persona,messages:history})});
  const data=await res.json();
  th.remove();
  if(data.error){document.getElementById('cerr').textContent='도사님이 잠시 자리를 비웠습니다: '+(data.error.message||'오류');
   document.getElementById('cerr').style.display='block';return;}
  const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
  history.push({role:'assistant',content:txt});
  addMsg(txt,'dosa');
 }catch(e){th.remove();
  document.getElementById('cerr').textContent='연결에 문제가 있습니다: '+e.message;
  document.getElementById('cerr').style.display='block';}
}

function send(){
 const q=document.getElementById('q');const t=q.value.trim();if(!t)return;
 document.getElementById('cerr').style.display='none';
 addMsg(t,'me');history.push({role:'user',content:t});q.value='';callDosa(1500);
}

function advToggle(id,btn){const el=document.getElementById(id);
 const open=el.style.display==='block';el.style.display=open?'none':'block';
 btn.textContent=open?'출생지 등 상세 설정 ⌄':'상세 설정 접기 ⌃';}
